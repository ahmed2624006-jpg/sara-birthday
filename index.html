<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarsora's Birthday ✨</title>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Pacifico&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-pink: #d81b60;
            --light-pink: #ffe4ec;
            --dark-pink: #ad1457;
            --white: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--light-pink);
            overflow-x: hidden;
            min-height: 100vh;
        }

        #password-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--primary-pink);
            z-index: 1000;
            display: flex; justify-content: center; align-items: center;
            transition: 0.8s ease-in-out;
        }

        .login-box {
            background: var(--white);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        .login-box input {
            padding: 12px;
            border: 2px solid var(--primary-pink);
            border-radius: 10px;
            width: 100%;
            text-align: center;
            font-size: 18px;
        }

        .login-box button {
            margin-top: 15px;
            background: var(--primary-pink);
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        #main-content { display: none; padding-bottom: 50px; }

        header { text-align: center; padding: 40px 20px; }

        header h1 {
            font-family: 'Pacifico';
            font-size: 2.5rem;
            color: var(--primary-pink);
        }

        .envelope-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 40px;
            padding: 20px;
        }

        .music-control {
            position: fixed;
            bottom: 20px;
            right: 20px;
        }

        .music-btn {
            background: var(--primary-pink);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 50px;
            cursor: pointer;
        }

        .heart {
            position: fixed;
            color: #ff4081;
            animation: float 5s linear infinite;
            z-index: -1;
        }

        @keyframes float {
            0% { transform: translateY(100vh); opacity: 0; }
            100% { transform: translateY(-10vh); opacity: 1; }
        }
    </style>
</head>

<body>

<!-- PASSWORD SCREEN -->
<div id="password-screen">
    <div class="login-box">
        <h2 style="font-family:'Pacifico'; color:#d81b60">Sarsora ❤️</h2>
        <input type="password" id="passInput" placeholder="اكتب i love you">
        <button onclick="checkPassword()">دخول ✨</button>
    </div>
</div>

<!-- MAIN -->
<div id="main-content">

    <header>
        <h1>Happy Birthday Sarsora 💖</h1>
    </header>

    <div class="envelope-container">
        <!-- (اختصرت الباقي عشان التركيز على المشكلة الأساسية) -->
    </div>

    <div class="music-control">
        <button class="music-btn" onclick="toggleMusic()">🎵 تشغيل الأغنية</button>
    </div>

    <div id="youtube-player"></div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
    let player;
    let playing = false;
    let playerReady = false;

    // تشغيل يوتيوب
    function onYouTubeIframeAPIReady() {
        player = new YT.Player('youtube-player', {
            height: '0',
            width: '0',
            videoId: '5F-0h_2S7eQ',
            playerVars: {
                autoplay: 0,
                controls: 0,
                loop: 1,
                playlist: '5F-0h_2S7eQ',
                origin: window.location.origin
            },
            events: {
                onReady: () => {
                    playerReady = true;
                }
            }
        });
    }

    // دخول الصفحة
    function checkPassword() {
        const pass = document.getElementById('passInput').value.toLowerCase().trim();

        if (pass === 'i love you') {
            document.getElementById('password-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';

            initHearts();
            startCountdown();

        } else {
            alert('كلمة السر غلط! ❤️');
        }
    }

    // تشغيل / إيقاف الموسيقى
    function toggleMusic() {
        if (!playerReady) {
            alert("استنى ثواني لحد ما الأغنية تتحمل ❤️");
            return;
        }

        if (!playing) {
            player.playVideo();
            playing = true;
            document.querySelector('.music-btn').innerHTML = "⏸️ إيقاف";
        } else {
            player.pauseVideo();
            playing = false;
            document.querySelector('.music-btn').innerHTML = "🎵 تشغيل الأغنية";
        }
    }

    // العد التنازلي
    function startCountdown() {
        const target = new Date("June 16, 2026 00:00:00").getTime();

        setInterval(() => {
            const now = new Date().getTime();
            const diff = target - now;

            const d = Math.floor(diff / (1000*60*60*24));
            const h = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
            const m = Math.floor((diff%(1000*60*60))/(1000*60));
            const s = Math.floor((diff%(1000*60))/1000);

            document.getElementById("countdown").innerHTML =
                `${d}d ${h}h ${m}m ${s}s`;

        }, 1000);
    }

    // قلوب
    function initHearts() {
        setInterval(() => {
            const h = document.createElement('div');
            h.innerHTML = '❤️';
            h.className = 'heart';
            h.style.left = Math.random() * 100 + 'vw';
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 5000);
        }, 300);
    }
</script>

</body>
</html>
