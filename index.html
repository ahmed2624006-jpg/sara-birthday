<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sarsora's Birthday ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        :root { --primary-pink: #d81b60; --light-pink: #ffe4ec; --dark-pink: #ad1457; --white: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--light-pink); overflow-x: hidden; min-height: 100vh; user-select: none; }

        /* شاشات الدخول */
        #music-gate, #password-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--primary-pink); z-index: 9000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; text-align: center; padding: 20px;
        }
        #password-screen { background: var(--white); display: none; z-index: 8000; }
        .start-btn, .login-box button {
            background: white; color: var(--primary-pink); border: none; padding: 15px 40px; 
            border-radius: 50px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px;
        }
        .login-box button { background: var(--primary-pink); color: white; width: 100%; border-radius: 10px; }
        .login-box input { padding: 12px; border: 2px solid var(--primary-pink); border-radius: 10px; width: 100%; text-align: center; margin-bottom: 10px; outline: none; }

        #main-content { display: none; padding-bottom: 50px; text-align: center; }
        header h1 { font-family: 'Pacifico'; font-size: 2.2rem; color: var(--primary-pink); padding: 25px; }

        /* الأظرف */
        .envelope-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 40px; padding: 20px; margin-top: 20px; }
        .envelope-wrapper { width: 220px; height: 150px; position: relative; cursor: pointer; }
        .envelope-img { width: 100%; height: 100%; background: #f48fb1; border-radius: 0 0 10px 10px; position: relative; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .envelope-img::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #e91e63; clip-path: polygon(0 0, 50% 55%, 100% 0); }
        .outer-ar-msg { color: var(--dark-pink); font-weight: bold; font-size: 14px; margin-top: 10px; display: block; }

        /* مودال الكتاب (بيظهر في نص الشاشة) */
        .book-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 10000;
            display: none; justify-content: center; align-items: center;
            backdrop-filter: blur(5px);
        }
        .book-container {
            width: 90%; max-width: 800px; height: 450px;
            background: white; border-radius: 15px;
            display: flex; overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            animation: openBook 0.6s ease-out;
            position: relative;
        }
        @keyframes openBook { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* الصفحة الشمال (الكلام) */
        .book-left {
            flex: 1.2; padding: 40px; display: flex; flex-direction: column;
            justify-content: center; text-align: left; background: #fff;
            border-right: 2px solid #f0f0f0;
        }
        .book-left p { font-size: 1.2rem; color: #444; font-style: italic; line-height: 1.6; font-family: 'Georgia', serif; }

        /* الصفحة اليمين (الصورة + هابي بيرث داي) */
        .book-right {
            flex: 1; background: #fdf2f8; display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 20px;
        }
        .book-right img { width: 90%; height: 70%; object-fit: cover; border-radius: 10px; border: 5px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .book-right h2 { font-family: 'Pacifico'; color: var(--primary-pink); margin-top: 15px; font-size: 1.5rem; }

        .close-book {
            position: absolute; top: 15px; right: 20px; font-size: 30px;
            color: #999; cursor: pointer; z-index: 10;
        }

        /* كارت الكشط */
        .scratch-box { width: 90%; max-width: 600px; margin: 20px auto; background: white; border-radius: 20px; position: relative; min-height: 250px; overflow: hidden; }
        #scratch-canvas { position: absolute; top: 0; left: 0; z-index: 5; }
        .scratch-content { padding: 30px; display: flex; align-items: center; gap: 20px; text-align: right; }

        /* فقاعات الكلام */
        .bubble {
            position: fixed; bottom: -100px; background: rgba(255,255,255,0.8);
            padding: 10px 20px; border-radius: 50px; color: var(--primary-pink);
            font-weight: bold; z-index: 1; animation: floatUp 6s linear forwards;
            border: 1px solid var(--primary-pink);
        }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateY(-120vh); opacity: 0; } }

        @media (max-width: 768px) {
            .book-container { flex-direction: column-reverse; height: auto; max-height: 90vh; }
            .book-left { padding: 20px; text-align: center; }
            .book-right img { height: 200px; }
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop><source src="https://files.catbox.moe/3a3mje.mp3" type="audio/mpeg"></audio>

    <div id="music-gate">
        <h2 style="font-family:'Pacifico'; font-size: 2.5rem;">Sarsora's World ❤️🪐</h2>
        <button class="start-btn" onclick="startEverything()">شغلي المفاجأة ✨</button>
    </div>

    <div id="password-screen">
        <div class="login-box">
            <h2 style="font-family:'Pacifico'; color:var(--primary-pink);">كلمة السر ❤️</h2>
            <input type="password" id="passInput" placeholder="اكتبي الباسورد هنا">
            <button onclick="checkPassword()">دخول ✨</button>
        </div>
    </div>

    <div id="main-content">
        <header><h1>Happy Birthday Sarsora 💖🪐</h1></header>

        <div class="scratch-box">
            <canvas id="scratch-canvas"></canvas>
            <div class="scratch-content">
                <img src="https://i.postimg.cc/x82jBCdQ/Screenshot-2026-05-04-063115.png" style="width:100px; border-radius:10px;">
                <p style="font-size:14px; font-weight:bold; color:var(--dark-pink);">اخر يوم شوفتك فيه بجد كان احلى يوم فحياتي.. كل سنة وانتي طيبة يروحي ❤️🪐</p>
            </div>
        </div>

        <div class="envelope-container" id="container">
            </div>
    </div>

    <div class="book-overlay" id="bookOverlay">
        <div class="book-container">
            <span class="close-book" onclick="closeBook()">&times;</span>
            <div class="book-left">
                <p id="bookText"></p>
            </div>
            <div class="book-right">
                <img id="bookImg" src="">
                <h2>Happy Birthday ✨</h2>
            </div>
        </div>
    </div>

    <script>
        const data = [
            { img: "https://i.postimg.cc/TP3DHt4m/Screenshot-2026-05-04-062811.png", en: "Since our first conversation, you've been the quiet spark that changed my world.", ar: "بحبك يا روحي ❤️" },
            { img: "https://i.postimg.cc/x82jBCdQ/Screenshot-2026-05-04-063115.png", en: "From the moment we met, something in my life shifted—like the universe guiding me to you.", ar: "نن عيني ❤️" },
            { img: "https://i.postimg.cc/65KTmH7M/Screenshot-2026-05-04-063027.png", en: "Even through screens, your laugh reaches me like sunlight—warm and impossible to forget.", ar: "كل سنة واحنا سوا ❤️" },
            { img: "https://i.postimg.cc/13pQdmQs/Screenshot-2026-05-04-060037.png", en: "Every notification from you feels like a heartbeat whispering 'I'm here.'", ar: "أغلى من حياتي ❤️" },
            { img: "https://i.postimg.cc/PNs7bDNF/Screenshot-2026-05-04-060239.png", en: "My heart knew where it wanted to stay—with you, in every quiet piece of forever.", ar: "أحلى سارسورة ❤️" },
            { img: "https://i.postimg.cc/13jmsMzp/Screenshot-2026-05-04-063209.png", en: "You're not just a person, you're my favorite place to be. Always here for you.", ar: "أقرب حد لقلبي ❤️" }
        ];

        function startEverything() {
            document.getElementById('bgMusic').play();
            document.getElementById('music-gate').style.display = 'none';
            document.getElementById('password-screen').style.display = 'flex';
        }

        function checkPassword() {
            if (document.getElementById('passInput').value.toLowerCase().trim() === 'i love you') {
                document.getElementById('password-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                renderEnvelopes();
                initScratch();
                setInterval(createBubble, 3000);
            } else { alert('الباسورد غلط ❤️'); }
        }

        function renderEnvelopes() {
            const container = document.getElementById('container');
            data.forEach((item, index) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'envelope-wrapper';
                wrapper.innerHTML = `<div class="envelope-img"></div><span class="outer-ar-msg">${item.ar}</span>`;
                wrapper.onclick = () => openBook(index);
                container.appendChild(wrapper);
            });
        }

        function openBook(index) {
            document.getElementById('bookImg').src = data[index].img;
            document.getElementById('bookText').innerText = data[index].en;
            document.getElementById('bookOverlay').style.display = 'flex';
        }

        function closeBook() {
            document.getElementById('bookOverlay').style.display = 'none';
        }

        function initScratch() {
            const canvas = document.getElementById('scratch-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.parentElement.offsetWidth;
            canvas.height = canvas.parentElement.offsetHeight;
            ctx.fillStyle = '#fdd835';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#d81b60'; ctx.font = 'bold 18px Cairo'; ctx.textAlign = 'center';
            ctx.fillText('خربشي الكارت يروحي ❤️🪐', canvas.width/2, canvas.height/2);

            let drawing = false;
            canvas.onmousedown = canvas.ontouchstart = () => drawing = true;
            window.onmouseup = window.ontouchend = () => drawing = false;
            canvas.onmousemove = canvas.ontouchmove = (e) => {
                if(!drawing) return;
                const rect = canvas.getBoundingClientRect();
                const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
                const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath(); ctx.arc(x, y, 30, 0, Math.PI*2); ctx.fill();
            };
        }

        function createBubble() {
            const words = ['بحبك ❤️', 'سارسورة ✨', 'يقلبي 🪐', 'جميلتي'];
            const b = document.createElement('div');
            b.className = 'bubble';
            b.innerText = words[Math.floor(Math.random()*words.length)];
            b.style.left = Math.random()*80 + 10 + 'vw';
            document.body.appendChild(b);
            setTimeout(() => b.remove(), 6000);
        }
    </script>
</body>
</html>
